<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bizAgent — Logowanie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #fbfbfd;
    --surface: #ffffff;
    --border: #d2d2d7;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --green: #34c759;
    --red: #ff3b30;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.04);
  }

  .logo { 
    display: flex; 
    align-items: center; 
    justify-content: center;
    gap: 8px; 
    margin-bottom: 32px; 
    text-decoration: none;
  }
  .logo-text { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .tabs { 
    display: flex; 
    gap: 0; 
    margin-bottom: 28px; 
    border-bottom: 1px solid var(--border); 
  }
  .tab {
    flex: 1; 
    padding: 12px; 
    text-align: center; 
    font-size: 15px; 
    font-weight: 500;
    color: var(--muted); 
    cursor: pointer; 
    border-bottom: 2px solid transparent;
    transition: all .2s;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; margin-top: 20px; }
  
  input[type=email], input[type=password] {
    width: 100%; 
    padding: 12px 16px; 
    background: var(--bg);
    border: 1.5px solid var(--border); 
    border-radius: 10px;
    color: var(--text); 
    font-size: 15px; 
    font-family: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
  
  .btn {
    width: 100%; 
    margin-top: 32px; 
    padding: 14px;
    background: var(--accent); 
    color: #fff; 
    border: none; 
    border-radius: 12px;
    font-size: 16px; 
    font-weight: 500; 
    cursor: pointer; 
    font-family: inherit;
    transition: background .15s, transform .15s;
    letter-spacing: -0.2px;
  }
  .btn:hover { background: var(--accent-hover); transform: scale(1.02); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  
  .error {
    margin-top: 16px; padding: 12px 16px; background: rgba(255,59,48,.1);
    border: 1px solid rgba(255,59,48,.2); border-radius: 10px;
    color: var(--red); font-size: 14px; display: none; text-align: center;
  }
  .success {
    margin-top: 16px; padding: 12px 16px; background: rgba(52,199,89,.1);
    border: 1px solid rgba(52,199,89,.2); border-radius: 10px;
    color: var(--green); font-size: 14px; display: none; text-align: center;
  }

  .password-hint {
    color: var(--muted);
    font-size: 12px;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-text">biz<span>Agent</span></div>
  </a>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Zaloguj się</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">Nowe konto</div>
  </div>

  <!-- Login form -->
  <div id="form-login">
    <label>Twój e-mail</label>
    <input type="email" id="login-email" placeholder="jan@firma.pl" autocomplete="email">
    <label>Hasło</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Zaloguj się</button>
    <div class="error" id="login-error"></div>
  </div>

  <!-- Register form -->
  <div id="form-register" style="display:none">
    <label>Twój e-mail</label>
    <input type="email" id="reg-email" placeholder="jan@firma.pl" autocomplete="email">
    <label>Hasło <span class="password-hint">(min. 6 znaków)</span></label>
    <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" onclick="doRegister()">Załóż konto</button>
    <div class="error" id="reg-error"></div>
    <div class="success" id="reg-success"></div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  const resp = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password }),
    credentials: 'include',
  });
  const data = await resp.json();
  if (data.success) {
    window.location.href = '/dashboard';
  } else {
    errEl.textContent    = data.error || 'Błąd logowania';
    errEl.style.display  = 'block';
  }
}

async function doRegister() {
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl    = document.getElementById('reg-error');
  const okEl     = document.getElementById('reg-success');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';
  const resp = await fetch('/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password }),
    credentials: 'include',
  });
  const data = await resp.json();
  if (data.success) {
    window.location.href = '/dashboard';
  } else {
    errEl.textContent   = data.error || 'Błąd rejestracji';
    errEl.style.display = 'block';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-login').style.display !== 'none') doLogin();
  else doRegister();
});
</script>
</body>
</html>
