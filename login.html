<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WooAI — Logowanie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11; --surface: #17171a; --border: rgba(255,255,255,0.07);
    --text: #e8e8ec; --muted: #7c7c8a; --accent: #7c6af7; --accent2: #5e4fd6;
    --green: #34d399; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .card {
    width: 100%; max-width: 420px; padding: 48px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #b06ef3);
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .logo-text span { color: var(--accent); font-style: italic; }

  .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  input[type=email], input[type=password] {
    width: 100%; padding: 11px 14px; background: #0f0f11;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; font-family: inherit;
    transition: border-color .2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; margin-top: 24px; padding: 12px;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
    transition: background .2s;
  }
  .btn:hover { background: var(--accent2); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    margin-top: 16px; padding: 10px 14px; background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.2); border-radius: 8px;
    color: var(--red); font-size: 13px; display: none;
  }
  .success {
    margin-top: 16px; padding: 10px 14px; background: rgba(52,211,153,.1);
    border: 1px solid rgba(52,211,153,.2); border-radius: 8px;
    color: var(--green); font-size: 13px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">✦</div>
    <div class="logo-text">Woo<span>AI</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Logowanie</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">Rejestracja</div>
  </div>

  <!-- Login form -->
  <div id="form-login">
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="ty@firma.pl" autocomplete="email">
    <label>Hasło</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Zaloguj się</button>
    <div class="error" id="login-error"></div>
  </div>

  <!-- Register form -->
  <div id="form-register" style="display:none">
    <label>E-mail</label>
    <input type="email" id="reg-email" placeholder="ty@firma.pl" autocomplete="email">
    <label>Hasło <span style="color:var(--muted);font-size:11px">(min. 6 znaków)</span></label>
    <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" onclick="doRegister()">Załóż konto</button>
    <div class="error" id="reg-error"></div>
    <div class="success" id="reg-success"></div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  const resp = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password }),
    credentials: 'include',
  });
  const data = await resp.json();
  if (data.success) {
    window.location.href = '/app';
  } else {
    errEl.textContent    = data.error || 'Błąd logowania';
    errEl.style.display  = 'block';
  }
}

async function doRegister() {
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl    = document.getElementById('reg-error');
  const okEl     = document.getElementById('reg-success');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';
  const resp = await fetch('/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password }),
    credentials: 'include',
  });
  const data = await resp.json();
  if (data.success) {
    window.location.href = '/app';
  } else {
    errEl.textContent   = data.error || 'Błąd rejestracji';
    errEl.style.display = 'block';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-login').style.display !== 'none') doLogin();
  else doRegister();
});
</script>
</body>
</html>
